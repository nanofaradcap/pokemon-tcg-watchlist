name: Daily Database Backup

on:
  schedule:
    # Runs every Sunday at 08:00 UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  backup:
    name: Create database snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify pg_dump version
        run: docker run --rm postgres:17-alpine pg_dump --version

      - name: Compute timestamp
        id: timestamp
        run: echo "utc=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create SQL dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TIMESTAMP: ${{ steps.timestamp.outputs.utc }}
        run: |
          mkdir -p backups/sql
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            -e TIMESTAMP="$TIMESTAMP" \
            -v "$PWD/backups/sql":/backup \
            postgres:17-alpine \
            sh -c 'pg_dump "$DATABASE_URL" --no-owner --no-privileges > "/backup/backup-$TIMESTAMP.sql"'

      - name: Package backups
        run: |
          tar -czf database-backup-${{ steps.timestamp.outputs.utc }}.tar.gz backups/sql

      - name: Upload backup artifact (retained 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.timestamp.outputs.utc }}
          path: database-backup-${{ steps.timestamp.outputs.utc }}.tar.gz
          retention-days: 30
